name: Run Unit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Check npm version
        run: npm --version

      - name: Install consistent npm version
        run: npm install -g npm@11.6.1

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
